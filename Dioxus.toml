[application]

# App (Project) Name
name = "Cobalt Installer"
default_platform = "desktop"

# Android: we only override MainActivity (it owns the folder picker and the SAF
# file writes). We do NOT supply a custom manifest, dx's default already adds the
# INTERNET permission and the right AppCompat theme/icon, and that's all we need
# (SAF needs no storage permission). min sdk 29 (Android 10) covers the SAF APIs.
android_main_activity = "android/MainActivity.kt"
android_min_sdk_version = 29

[bundle]
identifier = "com.divinedragonfanclub"
publisher = "Divine Dragon Fan Club"
icon = ["assets/SAMMIE.png"]

[web.app]

# HTML title tag content
title = "Cobalt Installer"

# include `assets` in web platform
[web.resource]

# Additional CSS style files
style = []

# Additional JavaScript files
script = []

[web.resource.dev]

# Javascript code file
# serve: [dev-server] only
script = []